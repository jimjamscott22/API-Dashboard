<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Dashboard</title>
    <style>
        :root {
            --bg-gradient-start: #667eea;
            --bg-gradient-end: #764ba2;
            --card-bg: white;
            --card-shadow: rgba(0,0,0,0.2);
            --text-primary: #333;
            --text-secondary: #666;
            --text-muted: #999;
            --accent: #667eea;
            --accent-hover: #5568d3;
            --border-color: #eee;
            --input-border: #667eea;
            --pollutant-bg: #f4f4f8;
            --error-bg: #fadbd8;
            --error-color: #e74c3c;
        }

        [data-theme="dark"] {
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            --card-bg: #0f3460;
            --card-shadow: rgba(0,0,0,0.5);
            --text-primary: #e0e0e0;
            --text-secondary: #b0b0c0;
            --text-muted: #7070a0;
            --accent: #a78bfa;
            --accent-hover: #8b6ef0;
            --border-color: #1e4080;
            --input-border: #a78bfa;
            --pollutant-bg: #0a2540;
            --error-bg: #4a1515;
            --error-color: #f87171;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--bg-gradient-start) 0%, var(--bg-gradient-end) 100%);
            min-height: 100vh;
            padding: 20px;
            transition: background 0.3s;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 30px;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        #themeToggle {
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            font-size: 1.3em;
            cursor: pointer;
            transition: background 0.3s;
            line-height: 1;
        }

        #themeToggle:hover {
            background: rgba(255,255,255,0.35);
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px var(--card-shadow);
            transition: transform 0.3s ease, background 0.3s;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: var(--accent);
            margin-bottom: 15px;
            font-size: 1.5em;
        }

        .loading {
            text-align: center;
            color: var(--text-secondary);
            padding: 20px;
        }

        .error {
            color: var(--error-color);
            padding: 10px;
            background: var(--error-bg);
            border-radius: 5px;
        }

        .last-updated {
            display: block;
            text-align: right;
            color: var(--text-muted);
            font-size: 0.75em;
            margin-top: 10px;
        }

        /* Weather Card */
        .weather-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .weather-icon {
            font-size: 3em;
        }

        .weather-temp {
            font-size: 2.5em;
            font-weight: bold;
            color: var(--accent);
        }

        .weather-details {
            margin-top: 10px;
            color: var(--text-secondary);
        }

        .city-input {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 2px solid var(--input-border);
            border-radius: 5px;
            font-size: 1em;
            background: var(--card-bg);
            color: var(--text-primary);
        }

        /* Crypto Card */
        .crypto-item {
            display: flex;
            justify-content: space-between;
            padding: 10px;
            border-bottom: 1px solid var(--border-color);
        }

        .crypto-item:last-child {
            border-bottom: none;
        }

        .crypto-name {
            font-weight: bold;
            color: var(--text-primary);
        }

        .crypto-price {
            color: var(--accent);
        }

        .crypto-change {
            font-size: 0.9em;
        }

        .positive {
            color: #27ae60;
        }

        .negative {
            color: #e74c3c;
        }

        /* Joke Card */
        .joke-text {
            font-style: italic;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .refresh-btn {
            margin-top: 15px;
            padding: 8px 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .refresh-btn:hover {
            background: var(--accent-hover);
        }

        /* NASA Card */
        .nasa-image {
            width: 100%;
            border-radius: 10px;
            margin: 15px 0;
        }

        .nasa-title {
            font-weight: bold;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .nasa-explanation {
            color: var(--text-secondary);
            font-size: 0.9em;
            line-height: 1.5;
            max-height: 150px;
            overflow-y: auto;
        }

        /* Quote Card */
        .quote-text {
            font-size: 1.1em;
            font-style: italic;
            color: var(--text-primary);
            line-height: 1.7;
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 12px;
        }

        .quote-author {
            text-align: right;
            color: var(--accent);
            font-weight: bold;
        }

        /* Air Quality Card */
        .aqi-badge {
            display: inline-block;
            padding: 6px 14px;
            border-radius: 20px;
            color: white;
            font-weight: bold;
            font-size: 1em;
            margin-bottom: 12px;
        }

        .aqi-index {
            font-size: 2em;
            font-weight: bold;
            display: inline-block;
            margin-right: 10px;
        }

        .aqi-pollutants {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        .pollutant {
            background: var(--pollutant-bg);
            border-radius: 6px;
            padding: 6px 10px;
        }

        .pollutant span {
            color: var(--accent);
            font-weight: bold;
        }

        /* Hacker News Card */
        .hn-story {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .hn-story:last-child {
            border-bottom: none;
        }

        .hn-title {
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 4px;
            line-height: 1.4;
        }

        .hn-title:hover {
            color: var(--accent);
        }

        .hn-meta {
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .hn-score {
            color: #e67e22;
            font-weight: bold;
        }

        /* On This Day Card */
        .otd-event {
            display: flex;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .otd-event:last-child {
            border-bottom: none;
        }

        .otd-year {
            flex-shrink: 0;
            background: var(--accent);
            color: white;
            border-radius: 6px;
            padding: 2px 8px;
            font-size: 0.8em;
            font-weight: bold;
            height: fit-content;
            margin-top: 2px;
        }

        .otd-text {
            color: var(--text-primary);
            font-size: 0.9em;
            line-height: 1.4;
        }

        .otd-text a {
            color: var(--accent);
            font-size: 0.85em;
            text-decoration: none;
            display: inline-block;
            margin-top: 2px;
        }

        .otd-text a:hover {
            text-decoration: underline;
        }

        /* GitHub Trending Card */
        .gh-repo {
            padding: 10px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .gh-repo:last-child {
            border-bottom: none;
        }

        .gh-repo-name {
            font-weight: 600;
            color: var(--accent);
            text-decoration: none;
            display: block;
            margin-bottom: 3px;
        }

        .gh-repo-name:hover {
            text-decoration: underline;
        }

        .gh-repo-desc {
            color: var(--text-secondary);
            font-size: 0.85em;
            line-height: 1.4;
            margin-bottom: 5px;
        }

        .gh-repo-meta {
            display: flex;
            gap: 12px;
            font-size: 0.8em;
            color: var(--text-muted);
        }

        .gh-stars {
            color: #f39c12;
            font-weight: bold;
        }

        .gh-lang {
            background: var(--pollutant-bg);
            padding: 1px 7px;
            border-radius: 10px;
            color: var(--text-secondary);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 Personal API Dashboard</h1>
            <button id="themeToggle" title="Toggle dark mode">🌙</button>
        </div>
        <div class="dashboard">
            <!-- Weather Card -->
            <div class="card">
                <h2>🌤️ Weather</h2>
                <input type="text" class="city-input" id="cityInput" placeholder="Enter city name" value="London">
                <div id="weatherContent" class="loading">Loading...</div>
            </div>

            <!-- Crypto Card -->
            <div class="card">
                <h2>💰 Crypto Prices</h2>
                <div id="cryptoContent" class="loading">Loading...</div>
            </div>

            <!-- Joke Card -->
            <div class="card">
                <h2>😄 Programming Joke</h2>
                <div id="jokeContent" class="loading">Loading...</div>
                <button class="refresh-btn" onclick="loadJoke()">New Joke</button>
            </div>

            <!-- NASA Card -->
            <div class="card">
                <h2>🌌 NASA Picture of the Day</h2>
                <div id="nasaContent" class="loading">Loading...</div>
            </div>

            <!-- Quote Card -->
            <div class="card">
                <h2>💬 Quote of the Day</h2>
                <div id="quoteContent" class="loading">Loading...</div>
            </div>

            <!-- Air Quality Card -->
            <div class="card">
                <h2>🌬️ Air Quality</h2>
                <input type="text" class="city-input" id="aqCityInput" placeholder="Enter city name" value="London">
                <div id="airQualityContent" class="loading">Loading...</div>
            </div>

            <!-- Hacker News Card -->
            <div class="card">
                <h2>🔥 Hacker News Top 5</h2>
                <div id="hackerNewsContent" class="loading">Loading...</div>
            </div>

            <!-- On This Day Card -->
            <div class="card">
                <h2>📅 On This Day</h2>
                <div id="onThisDayContent" class="loading">Loading...</div>
            </div>

            <!-- GitHub Trending Card -->
            <div class="card">
                <h2>⭐ GitHub Trending</h2>
                <div id="githubTrendingContent" class="loading">Loading...</div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';

        // ── Theme ──────────────────────────────────────────────────────────────
        const themeToggle = document.getElementById('themeToggle');

        function applyTheme(theme) {
            document.documentElement.setAttribute('data-theme', theme);
            themeToggle.textContent = theme === 'dark' ? '☀️' : '🌙';
        }

        applyTheme(localStorage.getItem('theme') || 'light');

        themeToggle.addEventListener('click', () => {
            const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            localStorage.setItem('theme', next);
            applyTheme(next);
        });

        // ── Last-updated helper ────────────────────────────────────────────────
        function markUpdated(contentId) {
            const el = document.getElementById(contentId);
            if (!el) return;
            const existing = el.parentElement.querySelector('.last-updated');
            if (existing) existing.remove();
            const stamp = document.createElement('small');
            stamp.className = 'last-updated';
            const now = new Date();
            stamp.textContent = `Updated ${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
            el.parentElement.appendChild(stamp);
        }

        // ── Weather ───────────────────────────────────────────────────────────
        async function loadWeather(city) {
            const content = document.getElementById('weatherContent');
            content.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/weather/${encodeURIComponent(city)}`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = `
                        <div class="weather-info">
                            <img class="weather-icon" src="http://openweathermap.org/img/wn/${data.icon}@2x.png" alt="${data.description}">
                            <div>
                                <div class="weather-temp">${data.temperature}°C</div>
                                <div>${data.description}</div>
                            </div>
                        </div>
                        <div class="weather-details">
                            <div>💧 Humidity: ${data.humidity}%</div>
                            <div>💨 Wind: ${data.wind_speed} m/s</div>
                        </div>
                    `;
                    markUpdated('weatherContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load weather data</div>`;
            }
        }

        // ── Crypto ────────────────────────────────────────────────────────────
        async function loadCrypto() {
            const content = document.getElementById('cryptoContent');

            try {
                const response = await fetch(`${API_BASE}/crypto`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = `
                        <div class="crypto-item">
                            <span class="crypto-name">Bitcoin</span>
                            <div>
                                <div class="crypto-price">$${data.bitcoin.price.toLocaleString()}</div>
                                <div class="crypto-change ${data.bitcoin.change >= 0 ? 'positive' : 'negative'}">
                                    ${data.bitcoin.change >= 0 ? '▲' : '▼'} ${Math.abs(data.bitcoin.change)}%
                                </div>
                            </div>
                        </div>
                        <div class="crypto-item">
                            <span class="crypto-name">Ethereum</span>
                            <div>
                                <div class="crypto-price">$${data.ethereum.price.toLocaleString()}</div>
                                <div class="crypto-change ${data.ethereum.change >= 0 ? 'positive' : 'negative'}">
                                    ${data.ethereum.change >= 0 ? '▲' : '▼'} ${Math.abs(data.ethereum.change)}%
                                </div>
                            </div>
                        </div>
                        <div class="crypto-item">
                            <span class="crypto-name">Cardano</span>
                            <div>
                                <div class="crypto-price">$${data.cardano.price.toLocaleString()}</div>
                                <div class="crypto-change ${data.cardano.change >= 0 ? 'positive' : 'negative'}">
                                    ${data.cardano.change >= 0 ? '▲' : '▼'} ${Math.abs(data.cardano.change)}%
                                </div>
                            </div>
                        </div>
                    `;
                    markUpdated('cryptoContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load crypto data</div>`;
            }
        }

        // ── Joke ──────────────────────────────────────────────────────────────
        async function loadJoke() {
            const content = document.getElementById('jokeContent');
            content.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/joke`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = `<div class="joke-text">${data.joke}</div>`;
                    markUpdated('jokeContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load joke</div>`;
            }
        }

        // ── NASA ──────────────────────────────────────────────────────────────
        async function loadNASA() {
            const content = document.getElementById('nasaContent');

            try {
                const response = await fetch(`${API_BASE}/nasa`);
                const data = await response.json();

                if (data.success) {
                    if (data.media_type === 'image') {
                        content.innerHTML = `
                            <div class="nasa-title">${data.title}</div>
                            <img class="nasa-image" src="${data.url}" alt="${data.title}">
                            <div class="nasa-explanation">${data.explanation}</div>
                        `;
                    } else {
                        content.innerHTML = `
                            <div class="nasa-title">${data.title}</div>
                            <div class="nasa-explanation">${data.explanation}</div>
                            <a href="${data.url}" target="_blank">View Media</a>
                        `;
                    }
                    markUpdated('nasaContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load NASA data</div>`;
            }
        }

        // ── Quote ─────────────────────────────────────────────────────────────
        async function loadQuote() {
            const content = document.getElementById('quoteContent');

            try {
                const response = await fetch(`${API_BASE}/quote`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = `
                        <div class="quote-text">"${data.quote}"</div>
                        <div class="quote-author">— ${data.author}</div>
                    `;
                    markUpdated('quoteContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load quote</div>`;
            }
        }

        // ── Air Quality ───────────────────────────────────────────────────────
        async function loadAirQuality(city) {
            const content = document.getElementById('airQualityContent');
            content.innerHTML = '<div class="loading">Loading...</div>';

            try {
                const response = await fetch(`${API_BASE}/air-quality/${encodeURIComponent(city)}`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = `
                        <div>
                            <span class="aqi-index" style="color:${data.aqi_color}">${data.aqi}</span>
                            <span class="aqi-badge" style="background:${data.aqi_color}">${data.aqi_label}</span>
                        </div>
                        <div class="aqi-pollutants">
                            <div class="pollutant">PM2.5 <span>${data.pm2_5} µg/m³</span></div>
                            <div class="pollutant">PM10 <span>${data.pm10} µg/m³</span></div>
                            <div class="pollutant">O₃ <span>${data.o3} µg/m³</span></div>
                            <div class="pollutant">NO₂ <span>${data.no2} µg/m³</span></div>
                        </div>
                    `;
                    markUpdated('airQualityContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load air quality data</div>`;
            }
        }

        // ── Hacker News ───────────────────────────────────────────────────────
        async function loadHackerNews() {
            const content = document.getElementById('hackerNewsContent');

            try {
                const response = await fetch(`${API_BASE}/hackernews`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = data.stories.map(story => `
                        <div class="hn-story">
                            <a class="hn-title" href="${story.url}" target="_blank" rel="noopener noreferrer">${story.title}</a>
                            <div class="hn-meta">
                                <span class="hn-score">▲ ${story.score}</span>
                                &nbsp;by ${story.by}
                                &nbsp;· ${story.comments} comments
                            </div>
                        </div>
                    `).join('');
                    markUpdated('hackerNewsContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load Hacker News stories</div>`;
            }
        }

        // ── On This Day ───────────────────────────────────────────────────────
        async function loadOnThisDay() {
            const content = document.getElementById('onThisDayContent');

            try {
                const response = await fetch(`${API_BASE}/onthisday`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = `<div style="font-size:0.85em;color:var(--text-muted);margin-bottom:8px">${data.date}</div>` +
                        data.events.map(e => `
                            <div class="otd-event">
                                <span class="otd-year">${e.year}</span>
                                <div class="otd-text">
                                    ${e.text}
                                    ${e.link ? `<br><a href="${e.link}" target="_blank" rel="noopener noreferrer">Wikipedia →</a>` : ''}
                                </div>
                            </div>
                        `).join('');
                    markUpdated('onThisDayContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load On This Day data</div>`;
            }
        }

        // ── GitHub Trending ───────────────────────────────────────────────────
        async function loadGithubTrending() {
            const content = document.getElementById('githubTrendingContent');

            try {
                const response = await fetch(`${API_BASE}/github-trending`);
                const data = await response.json();

                if (data.success) {
                    content.innerHTML = data.repos.map(repo => `
                        <div class="gh-repo">
                            <a class="gh-repo-name" href="${repo.url}" target="_blank" rel="noopener noreferrer">${repo.name}</a>
                            ${repo.description ? `<div class="gh-repo-desc">${repo.description}</div>` : ''}
                            <div class="gh-repo-meta">
                                <span class="gh-stars">⭐ ${repo.stars.toLocaleString()}</span>
                                <span class="gh-lang">${repo.language}</span>
                            </div>
                        </div>
                    `).join('');
                    markUpdated('githubTrendingContent');
                } else {
                    content.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                }
            } catch (error) {
                content.innerHTML = `<div class="error">Failed to load GitHub Trending data</div>`;
            }
        }

        // ── City input handlers ───────────────────────────────────────────────
        document.getElementById('cityInput').addEventListener('change', (e) => {
            localStorage.setItem('weather_city', e.target.value);
            loadWeather(e.target.value);
        });

        document.getElementById('aqCityInput').addEventListener('change', (e) => {
            localStorage.setItem('aq_city', e.target.value);
            loadAirQuality(e.target.value);
        });

        // ── Init ──────────────────────────────────────────────────────────────
        window.addEventListener('load', () => {
            // Restore persisted cities
            const weatherCity = localStorage.getItem('weather_city') || 'London';
            const aqCity = localStorage.getItem('aq_city') || 'London';
            document.getElementById('cityInput').value = weatherCity;
            document.getElementById('aqCityInput').value = aqCity;

            loadWeather(weatherCity);
            loadCrypto();
            loadJoke();
            loadNASA();
            loadQuote();
            loadAirQuality(aqCity);
            loadHackerNews();
            loadOnThisDay();
            loadGithubTrending();
        });
    </script>
</body>
</html>
